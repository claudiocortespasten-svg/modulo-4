<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación API Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Gestor de Usuarios - JSONPlaceholder</h1>
        <p class="text-muted">Revisa la consola F12 para ver los resultados</p>

        <div class="d-grid gap-2 col-md-6 mx-auto">
            <button class="btn btn-primary" onclick="gestor.listarNombres()">Listar nombres de todos</button>
            <button class="btn btn-primary" onclick="gestor.buscarInfoBasica()">Info básica por nombre</button>
            <button class="btn btn-primary" onclick="gestor.buscarDireccion()">Dirección por nombre</button>
            <button class="btn btn-primary" onclick="gestor.buscarInfoAvanzada()">Info avanzada por nombre</button>
            <button class="btn btn-primary" onclick="gestor.listarCompanias()">Listar compañías + catchphrase</button>
            <button class="btn btn-primary" onclick="gestor.listarNombresOrdenados()">Nombres ordenados</button>
        </div>
    </div>
    <script src="./js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body> 
</html>
